<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频播放页面</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0f0f0f;
    color: #fff;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    display: flex;
    gap: 24px;
    max-width: 1400px;
    width: 100%;
    padding: 24px;
  }

  /* ---- 主内容区 ---- */
  .main { flex: 1; min-width: 0; }

  .player-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
  }

  .player-wrapper video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .player-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: rgba(0,0,0,.35);
    transition: background .3s;
  }
  .player-overlay:hover { background: rgba(0,0,0,.5); }

  .play-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,.9);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s;
  }
  .play-btn:hover { transform: scale(1.1); }
  .play-btn::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-left: 22px solid #0f0f0f;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    margin-left: 5px;
  }

  .player-wrapper.playing .player-overlay { opacity: 0; pointer-events: none; }

  /* 视频信息 */
  .video-info { margin-top: 16px; }

  .video-title {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.4;
  }

  .video-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid #272727;
    color: #aaa;
    font-size: 14px;
  }

  .channel {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #f44336;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
  }

  .channel-name { font-weight: 600; color: #fff; }
  .sub-count { font-size: 12px; color: #aaa; }

  .subscribe-btn {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #fff;
    color: #0f0f0f;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  .subscribe-btn:hover { opacity: .85; }
  .subscribe-btn.subscribed { background: #272727; color: #fff; }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 20px;
    border: none;
    background: #272727;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s;
  }
  .action-btn:hover { background: #3f3f3f; }

  .description {
    margin-top: 16px;
    padding: 12px;
    background: #272727;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    cursor: pointer;
    white-space: pre-wrap;
  }

  /* 评论区 */
  .comments-section { margin-top: 24px; }

  .comments-header {
    display: flex;
    align-items: center;
    gap: 32px;
    margin-bottom: 24px;
  }
  .comments-header h3 { font-size: 18px; }

  .sort-btn {
    background: none;
    border: none;
    color: #aaa;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sort-btn:hover { color: #fff; }

  .comment-input-area {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .comment-input-area .avatar { flex-shrink: 0; }

  .comment-input-box {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .comment-input-box input {
    width: 100%;
    padding: 8px 0;
    background: none;
    border: none;
    border-bottom: 1px solid #3f3f3f;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .comment-input-box input:focus { border-color: #fff; }

  .comment-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .cancel-btn, .submit-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .cancel-btn { background: none; color: #fff; }
  .cancel-btn:hover { background: #272727; }
  .submit-btn { background: #3ea6ff; color: #0f0f0f; }
  .submit-btn:hover { opacity: .85; }
  .submit-btn:disabled { opacity: .4; cursor: default; }

  .comment {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .comment-body { flex: 1; }
  .comment-author { font-size: 13px; font-weight: 600; }
  .comment-time  { font-size: 12px; color: #aaa; margin-left: 8px; }
  .comment-text  { font-size: 14px; margin-top: 4px; line-height: 1.5; }
  .comment-actions-row { display: flex; gap: 16px; margin-top: 6px; }

  .comment-actions-row button {
    background: none; border: none;
    color: #aaa; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .comment-actions-row button:hover { color: #fff; }

  /* ---- 侧边栏 ---- */
  .sidebar {
    width: 400px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sidebar h3 { font-size: 16px; margin-bottom: 4px; }

  .video-card {
    display: flex;
    gap: 8px;
    cursor: pointer;
    border-radius: 8px;
    transition: background .2s;
  }
  .video-card:hover { background: #272727; }

  .thumbnail {
    width: 168px;
    height: 94px;
    border-radius: 8px;
    background: #1a1a1a;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 12px;
  }

  .thumbnail img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .duration {
    position: absolute;
    bottom: 4px; right: 4px;
    background: rgba(0,0,0,.8);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-channel, .card-meta {
    font-size: 12px;
    color: #aaa;
  }

  .card-channel:hover { color: #fff; }

  /* 响应式 */
  @media (max-width: 1024px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; }
  }

  @media (max-width: 640px) {
    .container { padding: 0; }
    .player-wrapper { border-radius: 0; }
    .video-meta { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- 主内容 -->
  <main class="main">

    <!-- 播放器 -->
    <div class="player-wrapper" id="playerWrapper">
      <video id="videoPlayer" src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
      <div class="player-overlay" id="playerOverlay">
        <button class="play-btn" aria-label="播放"></button>
      </div>
    </div>

    <!-- 视频信息 -->
    <div class="video-info">
      <h1 class="video-title">Big Buck Bunny — 开源动画短片 (4K HDR)</h1>

      <div class="video-meta">
        <div class="channel">
          <div class="avatar">B</div>
          <div>
            <div class="channel-name">Blender Studio</div>
            <div class="sub-count">120 万订阅者</div>
          </div>
          <button class="subscribe-btn" id="subscribeBtn" onclick="toggleSubscribe()">订阅</button>
        </div>

        <div class="actions">
          <button class="action-btn">👍 12.8 万</button>
          <button class="action-btn">👎</button>
          <button class="action-btn">↗ 分享</button>
          <button class="action-btn">⤓ 下载</button>
          <button class="action-btn">⋯</button>
        </div>
      </div>

      <div class="description" id="desc" onclick="this.classList.toggle('expanded')">
Big Buck Bunny 是 Blender 基金会发布的开源动画短片，使用 Blender 制作。讲述了一只大兔子 Big Buck Bunny 与三只小啮齿动物的故事。本视频展示了 Blender 在角色动画、物理模拟与渲染方面的强大能力。🎬

#开源动画 #Blender #4K
      </div>
    </div>

    <!-- 评论区 -->
    <section class="comments-section">
      <div class="comments-header">
        <h3>356 条评论</h3>
        <button class="sort-btn">↑ 热门</button>
      </div>

      <!-- 评论输入 -->
      <div class="comment-input-area">
        <div class="avatar">Y</div>
        <div class="comment-input-box">
          <input type="text" id="commentInput" placeholder="发表评论..." maxlength="500">
          <div class="comment-actions">
            <button class="cancel-btn" onclick="clearComment()">取消</button>
            <button class="submit-btn" id="submitBtn" disabled onclick="postComment()">评论</button>
          </div>
        </div>
      </div>

      <!-- 评论列表 -->
      <div id="commentsList"></div>
    </section>

  </main>

  <!-- 推荐侧边栏 -->
  <aside class="sidebar">
    <h3>推荐视频</h3>
    <div id="recommendList"></div>
  </aside>

</div>

<script>
  // ========== 播放器 ==========
  const wrapper  = document.getElementById('playerWrapper');
  const overlay  = document.getElementById('playerOverlay');
  const video    = document.getElementById('videoPlayer');

  overlay.addEventListener('click', () => {
    video.play();
    wrapper.classList.add('playing');
  });

  video.addEventListener('pause', () => wrapper.classList.remove('playing'));
  video.addEventListener('ended', () => wrapper.classList.remove('playing'));

  // ========== 订阅 ==========
  function toggleSubscribe() {
    const btn = document.getElementById('subscribeBtn');
    btn.classList.toggle('subscribed');
    btn.textContent = btn.classList.contains('subscribed') ? '已订阅' : '订阅';
  }

  // ========== 评论 ==========
  const commentInput = document.getElementById('commentInput');
  const submitBtn    = document.getElementById('submitBtn');

  commentInput.addEventListener('input', () => {
    submitBtn.disabled = !commentInput.value.trim();
  });

  const sampleComments = [
    { author: '影视爱好者', time: '2 天前', text: '画质太棒了！Blender 的渲染质量真的没话说，每一帧都能当壁纸 🎨', likes: 342 },
    { author: 'CodingLife', time: '5 天前', text: '作为开源项目，这个短片真的展示了社区的力量。强烈推荐给想学 Blender 的朋友。', likes: 218 },
    { author: '影迷小王', time: '1 周前', text: '十年前第一次看这部短片就被震撼到了，现在回看依然觉得制作精良。', likes: 156 },
    { author: 'TechReview', time: '1 周前', text: 'Big Buck Bunny 算是开源文化的标志性作品了，值得每一个创意工作者了解。', likes: 89 },
  ];

  function renderComments() {
    const container = document.getElementById('commentsList');
    container.innerHTML = sampleComments.map((c, i) => `
      <div class="comment">
        <div class="avatar" style="background:#${['ff5722','4caf50','2196f3','9c27b0'][i]}">${c.author[0]}</div>
        <div class="comment-body">
          <div>
            <span class="comment-author">${c.author}</span>
            <span class="comment-time">${c.time}</span>
          </div>
          <div class="comment-text">${c.text}</div>
          <div class="comment-actions-row">
            <button>👍 ${c.likes}</button>
            <button>👎</button>
            <button>回复</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function postComment() {
    const text = commentInput.value.trim();
    if (!text) return;
    sampleComments.unshift({ author: '你', time: '刚刚', text, likes: 0 });
    commentInput.value = '';
    submitBtn.disabled = true;
    renderComments();
  }

  function clearComment() {
    commentInput.value = '';
    submitBtn.disabled = true;
  }

  // ========== 推荐列表 ==========
  const recommendData = [
    { title: 'Sintel — Blender 开源电影完整版', channel: 'Blender Studio', views: '890 万', duration: '14:48', color: '#e91e63' },
    { title: 'Tears of Steel — 科幻短片全高清', channel: 'Blender Studio', views: '560 万', duration: '12:14', color: '#00bcd4' },
    { title: 'Spring — Blender 2.8 动画短片', channel: 'Blender Studio', views: '430 万', duration: '7:44', color: '#8bc34a' },
    { title: 'Caminandes 3 — 爆笑美洲驼动画', channel: 'Blender Studio', views: '320 万', duration: '2:34', color: '#ff9800' },
    { title: 'Cosmos Laundromat — 荒诞风格短片', channel: 'Blender Studio', views: '280 万', duration: '10:01', color: '#9c27b0' },
    { title: 'Hero — Blender 2.8 角色动画展示', channel: 'CG Geek', views: '670 万', duration: '4:22', color: '#3f51b5' },
    { title: 'Blender 4.0 新功能全面解析', channel: 'Blender Official', views: '1,200 万', duration: '22:10', color: '#f44336' },
    { title: '如何用 Blender 制作电影级场景', channel: 'CG Cookie', views: '340 万', duration: '18:55', color: '#607d8b' },
    { title: '开源动画十年回顾：从 Elephants Dream 到今天', channel: '开源影评', views: '95 万', duration: '8:30', color: '#795548' },
    { title: 'Blender vs Maya — 独立创作者的终极选择', channel: 'CG Talk', views: '480 万', duration: '15:12', color: '#009688' },
  ];

  function renderRecommend() {
    const container = document.getElementById('recommendList');
    container.innerHTML = recommendData.map(v => `
      <div class="video-card">
        <div class="thumbnail" style="background:${v.color}20; border:2px solid ${v.color}40;">
          <span style="color:${v.color}">🎬 ${v.title.slice(0,6)}...</span>
          <span class="duration">${v.duration}</span>
        </div>
        <div class="card-info">
          <div class="card-title">${v.title}</div>
          <div class="card-channel">${v.channel}</div>
          <div class="card-meta">${v.views} 次观看</div>
        </div>
      </div>
    `).join('');
  }

  // ========== 初始化 ==========
  renderComments();
  renderRecommend();
</script>

</body>
</html>
